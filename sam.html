<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Popup Form</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#1e4f54;
  --secondary:#ffc107;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
}

/* ===== NAVBAR ===== */
.custom-navbar{
  background:#fff;
  padding:15px 0;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.nav-wrapper{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

.logo{
  height:55px;
}

.nav-menu{
  display:flex;
  list-style:none;
  gap:30px;
}

.nav-menu a{
  text-decoration:none;
  color:#000;
  font-weight:500;
}

/* BUTTON */
.visit-btn{
  background:var(--secondary);
  padding:10px 20px;
  border-radius:30px;
  font-weight:600;
  color:#000;
  text-decoration:none;
}

/* TOGGLE */
.menu-toggle{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* ===== POPUP ===== */
.popup-form{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* BOX */
.form-box{
  width:90%;
  max-width:420px;
  background:#fff;
  padding:25px;
  border-radius:15px;
  position:relative;
  animation:popup 0.3s ease;
}

@keyframes popup{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* UNIQUE CLOSE BUTTON */
.popup-close{
  position:absolute;
  top:12px;
  right:12px;
  width:36px;
  height:36px;
  background:#f5f5f5;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.3s;
}

.popup-close:hover{
  background:var(--primary);
  color:#fff;
  transform:rotate(90deg);
}

/* FORM */
.form-box h2{
  margin-bottom:15px;
  color:var(--primary);
}

.form-box input,
.form-box select,
.form-box textarea{
  width:100%;
  margin-bottom:12px;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

.form-box textarea{
  height:80px;
}

/* BUTTON */
.form-box button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .nav-menu{
    display:none;
    position:absolute;
    top:70px;
    left:0;
    width:100%;
    background:#fff;
    flex-direction:column;
    padding:20px;
  }

  .nav-menu.active{
    display:flex;
  }

  .menu-toggle{
    display:block;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="custom-navbar">
  <div class="nav-wrapper">

    <img src="./images/logo.png" class="logo">

    <ul class="nav-menu">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Plots</a></li>
      <li><a href="#">Amenities</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <a href="#" class="visit-btn" id="openForm">Book Visit</a>

    <div class="menu-toggle">
      <i class="fa fa-bars"></i>
    </div>

  </div>
</nav>

<!-- POPUP -->
<div class="popup-form" id="popupForm">

  <div class="form-box">

    <!-- UNIQUE CLOSE -->
    <span class="popup-close" id="popupClose">
      <i class="fa-solid fa-xmark"></i>
    </span>

    <h2>Book Site Visit</h2>

    <form id="visitForm">

      <input type="text" placeholder="Your Name" required>

      <input type="tel" placeholder="Phone Number" required>

      <input type="date" required>

      <select required>
        <option value="">Select Property</option>
        <option>Coral Residency</option>
        <option>Crown City</option>
        <option>Crystal Gateway</option>
      </select>

      <textarea placeholder="Message"></textarea>

      <button type="submit">Submit</button>

    </form>

  </div>

</div>

<!-- JS -->
<script>

// TOGGLE MENU
document.querySelector(".menu-toggle").onclick = function(){
  document.querySelector(".nav-menu").classList.toggle("active");
}

// POPUP
const openBtn = document.getElementById("openForm");
const popup = document.getElementById("popupForm");
const closeBtn = document.getElementById("popupClose");
const form = document.getElementById("visitForm");

// OPEN
openBtn.addEventListener("click", (e)=>{
  e.preventDefault();
  popup.style.display = "flex";
});

// CLOSE BUTTON
closeBtn.addEventListener("click", ()=>{
  popup.style.display = "none";
});

// OUTSIDE CLICK CLOSE
popup.addEventListener("click", (e)=>{
  if(e.target === popup){
    popup.style.display = "none";
  }
});

// WHATSAPP SUBMIT
form.addEventListener("submit", function(e){
  e.preventDefault();

  const name = this.querySelector("input[type=text]").value;
  const phone = this.querySelector("input[type=tel]").value;
  const date = this.querySelector("input[type=date]").value;
  const property = this.querySelector("select").value;
  const message = this.querySelector("textarea").value;

  let msg = `Hi, I want to book a site visit.

Name: ${name}
Phone: ${phone}
Date: ${date}
Property: ${property}
Message: ${message}`;

  let url = "https://wa.me/918197135303?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");

  popup.style.display = "none";
});

</script>

</body>
</html>
